<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق التوصيل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #d4af37;
            --primary-dark: #b8960c;
            --bg: #f4f6f9;
            --card: #ffffff;
            --text: #1e293b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --radius: 20px;
            --shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .hidden { display: none !important; }
        .app-container { max-width: 480px; margin: 0 auto; padding: 16px; }
        .btn {
            padding: 14px 20px; border-radius: 14px; border: none; font-weight: bold;
            cursor: pointer; width: 100%; margin: 6px 0; font-size: 16px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.3s;
        }
        .btn-primary { background: var(--primary); color: #1e293b; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-outline-danger { background: transparent; border: 2px solid var(--danger); color: var(--danger); }
        input, select, textarea {
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 14px;
            border: 1px solid #e2e8f0; font-size: 16px; background: white;
        }
        .card {
            background: var(--card); border-radius: var(--radius); padding: 20px;
            margin: 16px 0; box-shadow: var(--shadow);
        }
        .header {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: var(--primary); padding: 20px; text-align: center;
            font-size: 1.6rem; font-weight: bold; position: sticky; top: 0;
            z-index: 10; border-bottom: 3px solid var(--primary);
        }
        .sub-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; background: white; border-radius: 14px;
            margin-bottom: 12px; box-shadow: var(--shadow);
        }
        .badge { background: var(--primary); color: #1e293b; padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }
        .status-badge {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-size: 0.8rem; font-weight: bold; color: white;
        }
        .pending { background: var(--warning); }
        .accepted { background: var(--info); }
        .picked { background: #8b5cf6; }
        .delivered { background: var(--success); }
        .cancelled { background: var(--danger); }
        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); display: flex; justify-content: center;
            align-items: center; z-index: 100; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white; width: 90%; max-width: 420px; border-radius: 24px;
            padding: 24px; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .chat-box { max-height: 220px; overflow-y: auto; background: #f8fafc; border-radius: 12px; padding: 12px; margin: 12px 0; }
        .chat-msg { margin-bottom: 8px; padding: 8px 12px; background: #e2e8f0; border-radius: 12px; }
        .msg-mine { background: #dbeafe; text-align: left; }
        .msg-sender { font-weight: bold; color: var(--primary-dark); }
        .text-center { text-align: center; }
    </style>
</head>
<body>

<!-- ========== الشاشة الرئيسية ========== -->
<div id="mainScreen" class="app-container">
    <div class="text-center" style="margin:40px 0;">
        <i class="fas fa-motorcycle" style="font-size:60px; color:var(--primary);"></i>
        <h2 style="margin:16px 0;">تطبيق التوصيل</h2>
    </div>
    <div class="card">
        <button class="btn btn-primary" onclick="showCustomerOrderForm()"><i class="fas fa-shopping-bag"></i> طلب توصيل جديد</button>
        <button class="btn btn-outline" onclick="showLoginForm()"><i class="fas fa-sign-in-alt"></i> دخول السائقين والإدارة</button>
    </div>
</div>

<!-- ========== شاشة تسجيل الدخول ========== -->
<div id="loginScreen" class="app-container hidden">
    <div class="card">
        <h3>تسجيل الدخول</h3>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button class="btn btn-primary" onclick="login()">دخول</button>
        <button class="btn btn-outline" onclick="goToMain()">رجوع</button>
        <div id="loginError" style="color:red; text-align:center;"></div>
    </div>
</div>

<!-- ========== شاشة طلب العميل (بدون تسجيل) ========== -->
<div id="customerOrderScreen" class="app-container hidden">
    <div class="header"><i class="fas fa-user"></i> طلب جديد</div>
    <div class="card">
        <input type="text" id="custName" placeholder="اسمك الكامل">
        <input type="tel" id="custPhone" placeholder="رقم الهاتف">
        <input type="text" id="pickupAddress" placeholder="مكان الطلب (المطعم/الصيدلية)">
        <input type="text" id="dropoffAddress" placeholder="مكان تسليم الطلب (عنوانك)">
        <input type="number" id="orderPrice" placeholder="السعر المقترح (ج.م)">
        <button class="btn btn-primary" onclick="createCustomerOrder()">إرسال الطلب</button>
        <button class="btn btn-outline" onclick="goToMain()">إلغاء</button>
    </div>
</div>

<!-- ========== شاشة السائق ========== -->
<div id="driverScreen" class="app-container hidden">
    <div class="header"><i class="fas fa-motorcycle"></i> الطلبات</div>
    <div class="sub-header">
        <span id="driverName">مرحباً</span>
        <button class="btn btn-outline" onclick="logout()" style="width:auto;"><i class="fas fa-sign-out-alt"></i></button>
    </div>
    <div id="driverOrdersList"></div>
</div>

<!-- ========== شاشة المدير ========== -->
<div id="adminScreen" class="app-container hidden">
    <div class="header"><i class="fas fa-chart-bar"></i> تقارير</div>
    <div class="sub-header">
        <span>لوحة التحكم</span>
        <button class="btn btn-outline" onclick="logout()" style="width:auto;">خروج</button>
    </div>
    <button class="btn btn-primary" onclick="showAllOrders()"><i class="fas fa-list"></i> جميع الطلبات</button>
    <div id="adminReports"></div>
    <div id="adminOrdersList"></div>
</div>

<!-- ========== نافذة الدردشة ========== -->
<div id="chatModal" class="modal hidden">
    <div class="modal-content">
        <h3><i class="fas fa-comments"></i> المحادثة</h3>
        <div class="chat-box" id="chatMessages"></div>
        <input type="text" id="chatInput" placeholder="رسالة...">
        <button class="btn btn-primary" onclick="sendMessage()">إرسال</button>
        <button class="btn btn-outline" onclick="closeChat()">إغلاق</button>
    </div>
</div>

<!-- ========== نافذة تفاصيل طلب للمدير ========== -->
<div id="adminOrderDetailModal" class="modal hidden">
    <div class="modal-content" id="adminOrderDetailContent"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, updateDoc, doc, serverTimestamp, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBbSoW0Rn56U4sgH2A1USfdAhY5gdIL8v4",
        authDomain: "delivery-app-f4af2.firebaseapp.com",
        projectId: "delivery-app-f4af2",
        storageBucket: "delivery-app-f4af2.firebasestorage.app",
        messagingSenderId: "490159202619",
        appId: "1:490159202619:web:7f30858e1d0d826fed971e",
        measurementId: "G-MYBKR56TEQ"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentUser = null; // { name, username, role } بعد تسجيل الدخول
    let currentOrderId = null;

    // ---------- التنقل بين الشاشات ----------
    function showScreen(id) {
        document.querySelectorAll('.app-container, .modal').forEach(el => el.classList.add('hidden'));
        const screen = document.getElementById(id);
        if (screen) screen.classList.remove('hidden');
    }

    window.goToMain = () => showScreen('mainScreen');
    window.showLoginForm = () => showScreen('loginScreen');
    window.showCustomerOrderForm = () => {
        document.getElementById('custName').value = '';
        document.getElementById('custPhone').value = '';
        document.getElementById('pickupAddress').value = '';
        document.getElementById('dropoffAddress').value = '';
        document.getElementById('orderPrice').value = '';
        showScreen('customerOrderScreen');
    };

    window.logout = () => {
        currentUser = null;
        goToMain();
    };

    // ---------- تسجيل الدخول للسائقين والإدارة ----------
    window.login = async () => {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        if (!username || !password) {
            document.getElementById('loginError').innerText = 'يرجى ملء جميع الحقول';
            return;
        }
        try {
            const q = query(collection(db, "users"), where("username", "==", username), where("password", "==", password));
            const snap = await getDocs(q);
            if (!snap.empty) {
                const userData = snap.docs[0].data();
                currentUser = {
                    name: userData.name,
                    username: userData.username,
                    role: userData.role
                };
                document.getElementById('loginError').innerText = '';
                loadUIAfterLogin();
            } else {
                document.getElementById('loginError').innerText = 'اسم المستخدم أو كلمة المرور خطأ';
            }
        } catch (e) {
            document.getElementById('loginError').innerText = 'خطأ: ' + e.message;
        }
    };

    function loadUIAfterLogin() {
        if (currentUser.role === 'driver') {
            document.getElementById('driverName').innerText = currentUser.name || 'سائق';
            showScreen('driverScreen');
            listenDriverOrders();
        } else if (currentUser.role === 'admin') {
            showScreen('adminScreen');
            listenAdmin();
        } else {
            // دور غير معروف – ارجع للرئيسية
            currentUser = null;
            goToMain();
        }
    }

    // ---------- إنشاء طلب من الزبون (بدون تسجيل) ----------
    window.createCustomerOrder = async () => {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        const pickup = document.getElementById('pickupAddress').value.trim();
        const dropoff = document.getElementById('dropoffAddress').value.trim();
        const price = Number(document.getElementById('orderPrice').value);
        if (!name || !phone || !pickup || !dropoff || !price) {
            alert('يرجى ملء جميع الحقول');
            return;
        }
        await addDoc(collection(db, "orders"), {
            customerName: name,
            customerPhone: phone,
            pickup,
            dropoff,
            price,
            status: "pending",
            driverId: null,
            counterPrice: null,
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
        });
        alert('تم إرسال الطلب بنجاح!');
        goToMain();
    };

    // ---------- عرض طلبات الزبون (غير مستخدم هنا، لكن يمكن إضافته) ----------
    // ---------- شاشة السائق ----------
    function listenDriverOrders() {
        const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
        onSnapshot(q, snap => {
            let html = '';
            snap.forEach(docSnap => {
                const o = docSnap.data();
                const id = docSnap.id;
                // السائق يرى الطلبات المعلقة، أو طلباته هو
                if (o.driverId && o.driverId !== currentUser.username) return;
                html += `<div class="card">
                    <b>${o.pickup} → ${o.dropoff}</b><br>
                    الزبون: ${o.customerName} (${o.customerPhone})<br>
                    السعر: ${o.price} ج.م | <span class="status-badge ${o.status}">${translateStatus(o.status)}</span><br>`;
                if (o.status === 'pending') {
                    html += `<input type="number" id="offerPrice${id}" placeholder="عرض سعرك" style="width:60%;">
                        <button class="btn btn-primary" onclick="makeCounterOffer('${id}')">تقديم عرض</button>
                        <button class="btn btn-success" onclick="acceptOrderDirect('${id}')">قبول مباشر</button>`;
                } else if (o.status === 'negotiating' && o.counterPrice) {
                    html += `عرضي: ${o.counterPrice} ج.م (بإنتظار العميل)`;
                } else if (o.status === 'accepted' && o.driverId === currentUser.username) {
                    html += `<button class="btn btn-primary" onclick="updateOrderStatus('${id}', 'picked_up')">تم الاستلام</button>`;
                } else if (o.status === 'picked_up' && o.driverId === currentUser.username) {
                    html += `<button class="btn btn-success" onclick="updateOrderStatus('${id}', 'delivered')">تم التسليم</button>`;
                }
                html += `<button class="btn btn-outline" onclick="openChat('${id}')">محادثة</button></div>`;
            });
            document.getElementById('driverOrdersList').innerHTML = html || '<p>لا طلبات حالياً.</p>';
        });
    }

    window.makeCounterOffer = async (orderId) => {
        const newPrice = Number(document.getElementById(`offerPrice${orderId}`).value);
        if (!newPrice) return;
        await updateDoc(doc(db, "orders", orderId), {
            status: "negotiating",
            counterPrice: newPrice,
            counterBy: currentUser.username,
            updatedAt: serverTimestamp()
        });
    };

    window.acceptOrderDirect = async (orderId) => {
        await updateDoc(doc(db, "orders", orderId), {
            driverId: currentUser.username,
            driverName: currentUser.name,
            driverPhone: currentUser.phone || '', // يمكن إضافة رقم للهاتف في بيانات المستخدم
            status: "accepted",
            updatedAt: serverTimestamp()
        });
    };

    window.updateOrderStatus = async (orderId, newStatus) => {
        await updateDoc(doc(db, "orders", orderId), { status: newStatus, updatedAt: serverTimestamp() });
    };

    // ---------- المدير ----------
    function listenAdmin() {
        const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
        onSnapshot(q, snap => {
            let reportHtml = '';
            const driverStats = {};
            const customerStats = {};
            snap.forEach(doc => {
                const o = doc.data();
                if (o.driverName) driverStats[o.driverName] = (driverStats[o.driverName] || 0) + 1;
                if (o.customerName) customerStats[o.customerName] = (customerStats[o.customerName] || 0) + 1;
            });
            reportHtml += '<div class="card"><h3><i class="fas fa-users"></i> السائقين</h3>';
            for (const [name, count] of Object.entries(driverStats)) {
                reportHtml += `<p>${name}: ${count} طلب</p>`;
            }
            reportHtml += '</div><div class="card"><h3><i class="fas fa-users"></i> الزبائن</h3>';
            for (const [name, count] of Object.entries(customerStats)) {
                reportHtml += `<p>${name}: ${count} طلب</p>`;
            }
            reportHtml += '</div>';
            document.getElementById('adminReports').innerHTML = reportHtml;
        });
    }

    window.showAllOrders = async () => {
        const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        let html = '';
        snap.forEach(doc => {
            const o = doc.data();
            html += `<div class="card" onclick="viewAdminOrderDetail('${doc.id}')" style="cursor:pointer">
                <b>${o.pickup} → ${o.dropoff}</b><br>
                <span class="status-badge ${o.status}">${translateStatus(o.status)}</span>
                | زبون: ${o.customerName || '---'} | سائق: ${o.driverName || '---'}
            </div>`;
        });
        document.getElementById('adminOrdersList').innerHTML = html || '<p>لا طلبات.</p>';
    };

    window.viewAdminOrderDetail = async (orderId) => {
        const docSnap = await getDoc(doc(db, "orders", orderId));
        if (!docSnap.exists()) return;
        const o = docSnap.data();
        const content = `
            <h3>تفاصيل الطلب</h3>
            <p><b>الزبون:</b> ${o.customerName} (${o.customerPhone})</p>
            <p><b>مكان الطلب:</b> ${o.pickup}</p>
            <p><b>مكان التسليم:</b> ${o.dropoff}</p>
            <p><b>السعر:</b> ${o.price} ج.م</p>
            <p><b>الحالة:</b> ${translateStatus(o.status)}</p>
            <p><b>السائق:</b> ${o.driverName || '---'} (${o.driverPhone || ''})</p>
            <p><b>تاريخ الإنشاء:</b> ${o.createdAt?.toDate().toLocaleString()}</p>
            <button class="btn btn-outline" onclick="closeAdminDetail()">إغلاق</button>
        `;
        document.getElementById('adminOrderDetailContent').innerHTML = content;
        document.getElementById('adminOrderDetailModal').classList.remove('hidden');
    };
    window.closeAdminDetail = () => document.getElementById('adminOrderDetailModal').classList.add('hidden');

    // ---------- الدردشة ----------
    window.openChat = (orderId) => {
        currentOrderId = orderId;
        document.getElementById('chatModal').classList.remove('hidden');
        listenChat(orderId);
    };
    window.closeChat = () => { document.getElementById('chatModal').classList.add('hidden'); currentOrderId = null; };

    function listenChat(orderId) {
        const q = query(collection(db, "orders", orderId, "messages"), orderBy("timestamp"));
        onSnapshot(q, snap => {
            let html = '';
            snap.forEach(doc => {
                const m = doc.data();
                const isMine = currentUser && m.senderId === currentUser.username;
                html += `<div class="chat-msg ${isMine ? 'msg-mine' : ''}">
                    <span class="msg-sender">${m.senderName}:</span> ${m.text}
                </div>`;
            });
            document.getElementById('chatMessages').innerHTML = html;
            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
        });
    }

    window.sendMessage = async () => {
        const text = document.getElementById('chatInput').value.trim();
        if (!text || !currentOrderId || !currentUser) return;
        await addDoc(collection(db, "orders", currentOrderId, "messages"), {
            senderId: currentUser.username,
            senderName: currentUser.name,
            text,
            timestamp: serverTimestamp()
        });
        document.getElementById('chatInput').value = '';
    };

    function translateStatus(status) {
        const map = {
            pending: 'معلق', accepted: 'مقبول', picked_up: 'تم الاستلام',
            delivered: 'تم التسليم', cancelled: 'ملغى', negotiating: 'تفاوض'
        };
        return map[status] || status;
    }

    // بدء التطبيق
    goToMain();

    // Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
</script>
</body>
</html>
