<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق التوصيل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #d4af37;
            --primary-dark: #b8960c;
            --bg: #f4f6f9;
            --card: #ffffff;
            --text: #1e293b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --radius: 20px;
            --shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .hidden { display: none !important; }
        .app-container { max-width: 500px; margin: 0 auto; padding: 16px; }
        .btn {
            padding: 14px 20px; border-radius: 14px; border: none; font-weight: bold;
            cursor: pointer; width: 100%; margin: 6px 0; font-size: 16px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.3s;
        }
        .btn-primary { background: var(--primary); color: #1e293b; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-outline-danger { background: transparent; border: 2px solid var(--danger); color: var(--danger); }
        input, select, textarea {
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 14px;
            border: 1px solid #e2e8f0; font-size: 16px; background: white;
        }
        .card {
            background: var(--card); border-radius: var(--radius); padding: 20px;
            margin: 16px 0; box-shadow: var(--shadow);
        }
        .header {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: var(--primary); padding: 20px; text-align: center;
            font-size: 1.6rem; font-weight: bold; position: sticky; top: 0;
            z-index: 10; border-bottom: 3px solid var(--primary);
        }
        .sub-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; background: white; border-radius: 14px;
            margin-bottom: 12px; box-shadow: var(--shadow);
        }
        .badge { background: var(--primary); color: #1e293b; padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }
        .status-badge {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-size: 0.8rem; font-weight: bold; color: white;
        }
        .pending { background: var(--warning); }
        .accepted { background: var(--info); }
        .picked_up { background: #8b5cf6; }
        .on_the_way { background: #6366f1; }
        .delivered { background: var(--success); }
        .cancelled { background: var(--danger); }
        .negotiating { background: #ec4899; }
        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); display: flex; justify-content: center;
            align-items: center; z-index: 100; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white; width: 90%; max-width: 420px; border-radius: 24px;
            padding: 24px; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .chat-box { max-height: 220px; overflow-y: auto; background: #f8fafc; border-radius: 12px; padding: 12px; margin: 12px 0; }
        .chat-msg { margin-bottom: 8px; padding: 8px 12px; background: #e2e8f0; border-radius: 12px; }
        .msg-mine { background: #dbeafe; text-align: left; }
        .msg-sender { font-weight: bold; color: var(--primary-dark); }
        .text-center { text-align: center; }
        .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
        .tab { flex: 1; padding: 10px; text-align: center; background: #e2e8f0; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .tab.active { background: var(--primary); color: #1e293b; }
        .btn-sm { padding: 8px 12px; font-size: 14px; width: auto; display: inline-block; }
    </style>
</head>
<body>

<!-- الشاشات كما هي في الكود السابق دون تغيير في الهيكل -->
<div id="mainScreen" class="app-container">
    <div class="text-center" style="margin:40px 0;">
        <i class="fas fa-motorcycle" style="font-size:60px; color:var(--primary);"></i>
        <h2 style="margin:16px 0;">تطبيق التوصيل</h2>
    </div>
    <div class="card">
        <button class="btn btn-primary" onclick="showCustomerOrderForm()"><i class="fas fa-shopping-bag"></i> طلب توصيل جديد</button>
        <button class="btn btn-outline" onclick="showTrackForm()"><i class="fas fa-search-location"></i> متابعة طلباتي</button>
        <button class="btn btn-outline" onclick="showLoginForm()"><i class="fas fa-sign-in-alt"></i> دخول السائقين والإدارة</button>
    </div>
</div>

<div id="loginScreen" class="app-container hidden">
    <div class="card">
        <h3>تسجيل الدخول</h3>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button class="btn btn-primary" onclick="login()">دخول</button>
        <button class="btn btn-outline" onclick="goToMain()">رجوع</button>
        <div id="loginError" style="color:red; text-align:center;"></div>
    </div>
</div>

<div id="customerOrderScreen" class="app-container hidden">
    <div class="header"><i class="fas fa-user"></i> طلب جديد</div>
    <div class="card">
        <input type="text" id="custName" placeholder="اسمك الكامل">
        <input type="tel" id="custPhone" placeholder="رقم الهاتف (مهم لتتبع الطلب)">
        <input type="text" id="pickupAddress" placeholder="مكان الطلب (المطعم/الصيدلية)">
        <input type="text" id="dropoffAddress" placeholder="مكان تسليم الطلب (عنوانك)">
        <input type="number" id="orderPrice" placeholder="السعر المقترح (ج.م)">
        <button class="btn btn-primary" onclick="createCustomerOrder()">إرسال الطلب</button>
        <button class="btn btn-outline" onclick="goToMain()">إلغاء</button>
    </div>
</div>

<div id="trackScreen" class="app-container hidden">
    <div class="header"><i class="fas fa-list-alt"></i> متابعة طلباتي</div>
    <div class="card">
        <input type="tel" id="trackPhone" placeholder="أدخل رقم هاتفك الذي استخدمته في الطلب">
        <button class="btn btn-primary" onclick="loadCustomerOrdersByPhone()">عرض الطلبات</button>
        <div id="trackError" style="color:red; text-align:center;"></div>
    </div>
    <div id="customerOrdersList"></div>
    <button class="btn btn-outline" onclick="goToMain()">رجوع للرئيسية</button>
</div>

<div id="driverScreen" class="app-container hidden">
    <div class="header"><i class="fas fa-motorcycle"></i> الطلبات</div>
    <div class="sub-header">
        <span id="driverName">مرحباً</span>
        <button class="btn btn-outline" onclick="logout()" style="width:auto;"><i class="fas fa-sign-out-alt"></i></button>
    </div>
    <div id="driverOrdersList"></div>
</div>

<div id="adminScreen" class="app-container hidden">
    <div class="header"><i class="fas fa-chart-bar"></i> لوحة التحكم</div>
    <div class="sub-header">
        <span>مدير النظام</span>
        <button class="btn btn-outline" onclick="logout()" style="width:auto;">خروج</button>
    </div>
    <div class="tabs">
        <div class="tab active" onclick="showAdminTab('orders', this)">الطلبات</div>
        <div class="tab" onclick="showAdminTab('drivers', this)">السائقين</div>
        <div class="tab" onclick="showAdminTab('reports', this)">تقارير</div>
    </div>
    <div id="adminOrdersTab">
        <button class="btn btn-primary" onclick="loadAllOrders()"><i class="fas fa-sync-alt"></i> تحديث الطلبات</button>
        <div id="adminOrdersList"></div>
    </div>
    <div id="adminDriversTab" class="hidden">
        <div class="card">
            <h4>إضافة سائق جديد</h4>
            <input type="text" id="newDriverUsername" placeholder="اسم المستخدم">
            <input type="password" id="newDriverPassword" placeholder="كلمة المرور">
            <input type="text" id="newDriverName" placeholder="الاسم الكامل">
            <input type="tel" id="newDriverPhone" placeholder="رقم الهاتف">
            <button class="btn btn-primary" onclick="addDriver()">إضافة سائق</button>
            <div id="addDriverError" style="color:red;"></div>
        </div>
        <div id="driversList"></div>
    </div>
    <div id="adminReportsTab" class="hidden">
        <div id="adminReportsContent"></div>
    </div>
</div>

<div id="chatModal" class="modal hidden">
    <div class="modal-content">
        <h3><i class="fas fa-comments"></i> المحادثة</h3>
        <div class="chat-box" id="chatMessages"></div>
        <input type="text" id="chatInput" placeholder="رسالة...">
        <button class="btn btn-primary" onclick="sendMessage()">إرسال</button>
        <button class="btn btn-outline" onclick="closeChat()">إغلاق</button>
    </div>
</div>

<div id="adminOrderDetailModal" class="modal hidden">
    <div class="modal-content" id="adminOrderDetailContent"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, updateDoc, doc, serverTimestamp, getDocs, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBbSoW0Rn56U4sgH2A1USfdAhY5gdIL8v4",
        authDomain: "delivery-app-f4af2.firebaseapp.com",
        projectId: "delivery-app-f4af2",
        storageBucket: "delivery-app-f4af2.firebasestorage.app",
        messagingSenderId: "490159202619",
        appId: "1:490159202619:web:7f30858e1d0d826fed971e",
        measurementId: "G-MYBKR56TEQ"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentUser = null;
    let currentOrderId = null;
    window.tempCustomer = null; // لحفظ بيانات الزبون المؤقتة للدردشة

    // ---------- التنقل ----------
    function showScreen(id) {
        document.querySelectorAll('.app-container, .modal').forEach(el => el.classList.add('hidden'));
        const screen = document.getElementById(id);
        if (screen) screen.classList.remove('hidden');
    }

    window.goToMain = () => showScreen('mainScreen');
    window.showLoginForm = () => showScreen('loginScreen');
    window.showCustomerOrderForm = () => {
        document.getElementById('custName').value = '';
        document.getElementById('custPhone').value = '';
        document.getElementById('pickupAddress').value = '';
        document.getElementById('dropoffAddress').value = '';
        document.getElementById('orderPrice').value = '';
        showScreen('customerOrderScreen');
    };
    window.showTrackForm = () => {
        document.getElementById('trackPhone').value = '';
        document.getElementById('customerOrdersList').innerHTML = '';
        document.getElementById('trackError').innerText = '';
        showScreen('trackScreen');
    };

    window.logout = () => {
        currentUser = null;
        goToMain();
    };

    // ---------- تسجيل الدخول ----------
    window.login = async () => {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        if (!username || !password) {
            document.getElementById('loginError').innerText = 'يرجى ملء جميع الحقول';
            return;
        }
        try {
            const q = query(collection(db, "users"), where("username", "==", username), where("password", "==", password));
            const snap = await getDocs(q);
            if (!snap.empty) {
                const userData = snap.docs[0].data();
                currentUser = {
                    id: snap.docs[0].id,
                    name: userData.name,
                    username: userData.username,
                    role: userData.role,
                    phone: userData.phone || ''
                };
                document.getElementById('loginError').innerText = '';
                if (currentUser.role === 'driver') {
                    document.getElementById('driverName').innerText = currentUser.name || 'سائق';
                    showScreen('driverScreen');
                    listenDriverOrders();
                } else if (currentUser.role === 'admin') {
                    showScreen('adminScreen');
                    showAdminTab('orders', document.querySelector('.tab.active'));
                    loadAllOrders();
                    listenAdminReports();
                }
            } else {
                document.getElementById('loginError').innerText = 'اسم المستخدم أو كلمة المرور خطأ';
            }
        } catch (e) {
            document.getElementById('loginError').innerText = 'خطأ في تسجيل الدخول: ' + e.message;
        }
    };

    // ---------- طلب الزبون ----------
    window.createCustomerOrder = async () => {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        const pickup = document.getElementById('pickupAddress').value.trim();
        const dropoff = document.getElementById('dropoffAddress').value.trim();
        const price = Number(document.getElementById('orderPrice').value);
        if (!name || !phone || !pickup || !dropoff || !price) {
            alert('يرجى ملء جميع الحقول');
            return;
        }
        try {
            await addDoc(collection(db, "orders"), {
                customerName: name,
                customerPhone: phone,
                pickup,
                dropoff,
                price,
                status: "pending",
                driverId: null,
                driverName: null,
                driverPhone: null,
                counterPrice: null,
                counterBy: null,
                createdAt: serverTimestamp(),
                updatedAt: serverTimestamp()
            });
            alert('تم إرسال الطلب بنجاح! تابع طلبك من خلال "متابعة طلباتي" وأدخل رقم هاتفك.');
            goToMain();
        } catch (e) {
            alert('فشل في إرسال الطلب: ' + e.message);
        }
    };

    // ---------- تتبع الزبون ----------
    window.loadCustomerOrdersByPhone = async () => {
        const phone = document.getElementById('trackPhone').value.trim();
        const errorDiv = document.getElementById('trackError');
        errorDiv.innerText = '';
        if (!phone) { errorDiv.innerText = 'أدخل رقم الهاتف'; return; }
        try {
            // لا نستخدم orderBy مع where، بل نجلب الكل ثم نرتب
            const q = query(collection(db, "orders"), where("customerPhone", "==", phone));
            const snap = await getDocs(q);
            let orders = [];
            snap.forEach(docSnap => {
                orders.push({ id: docSnap.id, ...docSnap.data() });
            });
            // ترتيب تنازلي حسب createdAt
            orders.sort((a, b) => {
                const timeA = a.createdAt?.seconds || 0;
                const timeB = b.createdAt?.seconds || 0;
                return timeB - timeA;
            });

            let html = '';
            orders.forEach(o => {
                const id = o.id;
                html += `<div class="card">
                    <b>${o.pickup} ← ${o.dropoff}</b><br>
                    السعر: ${o.price} ج.م | <span class="status-badge ${o.status}">${translateStatus(o.status)}</span><br>
                    السائق: ${o.driverName || 'لم يعين بعد'}`;
                if (o.status === 'negotiating' && o.counterPrice) {
                    html += `<br><span style="color:red;">عرض سعر جديد: ${o.counterPrice} ج.م</span>
                        <button class="btn btn-success btn-sm" onclick="customerAcceptCounter('${id}')">قبول</button>
                        <button class="btn btn-danger btn-sm" onclick="customerRejectCounter('${id}')">رفض</button>`;
                }
                if (o.status === 'pending') {
                    html += `<button class="btn btn-outline-danger btn-sm" onclick="customerCancelOrder('${id}')">إلغاء الطلب</button>`;
                }
                if (o.status !== 'delivered' && o.status !== 'cancelled') {
                    html += `<button class="btn btn-outline btn-sm" onclick="customerOpenChat('${id}')"><i class="fas fa-comment"></i> دردشة</button>`;
                }
                html += `</div>`;
            });
            document.getElementById('customerOrdersList').innerHTML = html || '<p>لا توجد طلبات بهذا الرقم.</p>';
        } catch (e) {
            errorDiv.innerText = 'خطأ في جلب الطلبات: ' + e.message;
            console.error(e);
        }
    };

    window.customerAcceptCounter = async (orderId) => {
        try {
            const snap = await getDoc(doc(db, "orders", orderId));
            if (!snap.exists()) return;
            const data = snap.data();
            const newPrice = data.counterPrice;
            const counterBy = data.counterBy;
            let driverUpdate = {};
            if (counterBy) {
                const driverQ = query(collection(db, "users"), where("username", "==", counterBy));
                const driverSnap = await getDocs(driverQ);
                if (!driverSnap.empty) {
                    const driverData = driverSnap.docs[0].data();
                    driverUpdate = {
                        driverId: driverData.username,
                        driverName: driverData.name,
                        driverPhone: driverData.phone || ''
                    };
                }
            }
            await updateDoc(doc(db, "orders", orderId), {
                status: "accepted",
                price: newPrice,
                ...driverUpdate,
                counterPrice: null,
                counterBy: null,
                updatedAt: serverTimestamp()
            });
            loadCustomerOrdersByPhone();
        } catch (e) {
            alert('فشل قبول العرض: ' + e.message);
        }
    };

    window.customerRejectCounter = async (orderId) => {
        try {
            await updateDoc(doc(db, "orders", orderId), {
                status: "pending",
                counterPrice: null,
                counterBy: null,
                updatedAt: serverTimestamp()
            });
            loadCustomerOrdersByPhone();
        } catch (e) {
            alert('فشل رفض العرض: ' + e.message);
        }
    };

    window.customerCancelOrder = async (orderId) => {
        if (confirm('هل تريد إلغاء هذا الطلب؟')) {
            try {
                await updateDoc(doc(db, "orders", orderId), { status: "cancelled", updatedAt: serverTimestamp() });
                loadCustomerOrdersByPhone();
            } catch (e) {
                alert('فشل إلغاء الطلب: ' + e.message);
            }
        }
    };

    window.customerOpenChat = (orderId) => {
        currentOrderId = orderId;
        getDoc(doc(db, "orders", orderId)).then(snap => {
            if (snap.exists()) {
                const data = snap.data();
                window.tempCustomer = { name: data.customerName, phone: data.customerPhone };
                document.getElementById('chatModal').classList.remove('hidden');
                listenChat(orderId, false);
            }
        }).catch(e => alert('خطأ: ' + e.message));
    };

    // ---------- السائق ----------
    function listenDriverOrders() {
        const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
        onSnapshot(q, snap => {
            let html = '';
            snap.forEach(docSnap => {
                const o = docSnap.data();
                const id = docSnap.id;
                if (o.driverId && o.driverId !== currentUser.username) return;
                if (o.status === 'delivered' || o.status === 'cancelled') return;
                html += `<div class="card">
                    <b>${o.pickup} ← ${o.dropoff}</b><br>
                    الزبون: ${o.customerName} (${o.customerPhone})<br>
                    السعر: ${o.price} ج.م | <span class="status-badge ${o.status}">${translateStatus(o.status)}</span><br>`;
                if (o.status === 'pending') {
                    html += `<input type="number" id="offerPrice${id}" placeholder="عرض سعرك" style="width:60%;">
                        <button class="btn btn-primary" onclick="makeCounterOffer('${id}')">تقديم عرض</button>
                        <button class="btn btn-success" onclick="acceptOrderDirect('${id}')">قبول مباشر</button>`;
                } else if (o.status === 'negotiating' && o.counterPrice && o.counterBy === currentUser.username) {
                    html += `عرضي: ${o.counterPrice} ج.م (بإنتظار رد العميل)`;
                } else if (o.status === 'accepted' && o.driverId === currentUser.username) {
                    html += `<button class="btn btn-primary" onclick="updateOrderStatus('${id}', 'picked_up')">تم استلام الطلب</button>`;
                } else if (o.status === 'picked_up' && o.driverId === currentUser.username) {
                    html += `<button class="btn btn-primary" onclick="updateOrderStatus('${id}', 'on_the_way')">جاري التوصيل</button>`;
                } else if (o.status === 'on_the_way' && o.driverId === currentUser.username) {
                    html += `<button class="btn btn-success" onclick="updateOrderStatus('${id}', 'delivered')">تم التسليم</button>`;
                }
                html += `<button class="btn btn-outline" onclick="openChat('${id}')">محادثة</button></div>`;
            });
            document.getElementById('driverOrdersList').innerHTML = html || '<p>لا طلبات حالياً.</p>';
        }, error => {
            console.error("خطأ في استماع طلبات السائق:", error);
        });
    }

    window.makeCounterOffer = async (orderId) => {
        const priceEl = document.getElementById(`offerPrice${orderId}`);
        if (!priceEl) return;
        const newPrice = Number(priceEl.value);
        if (!newPrice) { alert('أدخل سعراً صحيحاً'); return; }
        try {
            await updateDoc(doc(db, "orders", orderId), {
                status: "negotiating",
                counterPrice: newPrice,
                counterBy: currentUser.username,
                updatedAt: serverTimestamp()
            });
        } catch (e) {
            alert('فشل تقديم العرض: ' + e.message);
        }
    };

    window.acceptOrderDirect = async (orderId) => {
        try {
            await updateDoc(doc(db, "orders", orderId), {
                driverId: currentUser.username,
                driverName: currentUser.name,
                driverPhone: currentUser.phone || '',
                status: "accepted",
                updatedAt: serverTimestamp()
            });
        } catch (e) {
            alert('فشل قبول الطلب: ' + e.message);
        }
    };

    window.updateOrderStatus = async (orderId, newStatus) => {
        try {
            await updateDoc(doc(db, "orders", orderId), { status: newStatus, updatedAt: serverTimestamp() });
        } catch (e) {
            alert('فشل تحديث الحالة: ' + e.message);
        }
    };

    // ---------- المدير ----------
    window.showAdminTab = (tabName, element) => {
        document.querySelectorAll('#adminScreen .tab').forEach(t => t.classList.remove('active'));
        element.classList.add('active');
        document.getElementById('adminOrdersTab').classList.add('hidden');
        document.getElementById('adminDriversTab').classList.add('hidden');
        document.getElementById('adminReportsTab').classList.add('hidden');
        if (tabName === 'orders') {
            document.getElementById('adminOrdersTab').classList.remove('hidden');
            loadAllOrders();
        } else if (tabName === 'drivers') {
            document.getElementById('adminDriversTab').classList.remove('hidden');
            loadDrivers();
        } else if (tabName === 'reports') {
            document.getElementById('adminReportsTab').classList.remove('hidden');
            loadAdminReports();
        }
    };

    window.loadAllOrders = async () => {
        try {
            const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            let html = '';
            snap.forEach(docSnap => {
                const o = docSnap.data();
                const id = docSnap.id;
                html += `<div class="card">
                    <b>${o.pickup} ← ${o.dropoff}</b><br>
                    <span class="status-badge ${o.status}">${translateStatus(o.status)}</span>
                    | زبون: ${o.customerName || '---'} | سائق: ${o.driverName || '---'}<br>
                    السعر: ${o.price} ج.م`;
                if (o.status !== 'delivered' && o.status !== 'cancelled') {
                    html += `<div style="margin-top:8px; display:flex; gap:8px; flex-wrap:wrap;">
                        <button class="btn btn-sm btn-danger" onclick="adminCancelOrder('${id}')">إلغاء الطلب</button>
                        <button class="btn btn-sm btn-primary" onclick="adminChangePrice('${id}')">تعديل السعر</button>
                        <button class="btn btn-sm btn-outline" onclick="viewAdminOrderDetail('${id}')">تفاصيل</button>
                    </div>`;
                } else {
                    html += `<br><button class="btn btn-sm btn-outline" onclick="viewAdminOrderDetail('${id}')">تفاصيل</button>`;
                }
                html += `</div>`;
            });
            document.getElementById('adminOrdersList').innerHTML = html || '<p>لا طلبات.</p>';
        } catch (e) {
            alert('خطأ في تحميل الطلبات: ' + e.message);
        }
    };

    window.adminCancelOrder = async (orderId) => {
        if (confirm('هل أنت متأكد من إلغاء هذا الطلب؟')) {
            try {
                await updateDoc(doc(db, "orders", orderId), {
                    status: "cancelled",
                    updatedAt: serverTimestamp()
                });
                loadAllOrders();
            } catch (e) {
                alert('فشل إلغاء الطلب: ' + e.message);
            }
        }
    };

    window.adminChangePrice = (orderId) => {
        const newPrice = prompt("أدخل السعر الجديد (بالجنية):");
        if (newPrice === null) return; // ألغى
        const priceNum = Number(newPrice);
        if (!newPrice || isNaN(priceNum) || priceNum <= 0) {
            alert("سعر غير صحيح");
            return;
        }
        updateDoc(doc(db, "orders", orderId), {
            status: "negotiating",
            counterPrice: priceNum,
            counterBy: currentUser.username,
            updatedAt: serverTimestamp()
        }).then(() => loadAllOrders())
          .catch(e => alert('فشل تعديل السعر: ' + e.message));
    };

    window.viewAdminOrderDetail = async (orderId) => {
        try {
            const docSnap = await getDoc(doc(db, "orders", orderId));
            if (!docSnap.exists()) return;
            const o = docSnap.data();
            let actionButtons = '';
            if (o.status !== 'delivered' && o.status !== 'cancelled') {
                actionButtons = `
                    <button class="btn btn-danger" onclick="adminCancelOrder('${orderId}')">إلغاء الطلب</button>
                    <button class="btn btn-primary" onclick="adminChangePrice('${orderId}')">تعديل السعر</button>
                `;
            }
            const content = `
                <h3>تفاصيل الطلب</h3>
                <p><b>الزبون:</b> ${o.customerName} (${o.customerPhone})</p>
                <p><b>مكان الطلب:</b> ${o.pickup}</p>
                <p><b>مكان التسليم:</b> ${o.dropoff}</p>
                <p><b>السعر:</b> ${o.price} ج.م</p>
                <p><b>الحالة:</b> ${translateStatus(o.status)}</p>
                <p><b>السائق:</b> ${o.driverName || '---'} (${o.driverPhone || ''})</p>
                <p><b>تاريخ الإنشاء:</b> ${o.createdAt?.toDate().toLocaleString()}</p>
                ${actionButtons}
                <button class="btn btn-outline" onclick="closeAdminDetail()">إغلاق</button>
            `;
            document.getElementById('adminOrderDetailContent').innerHTML = content;
            document.getElementById('adminOrderDetailModal').classList.remove('hidden');
        } catch (e) {
            alert('خطأ: ' + e.message);
        }
    };
    window.closeAdminDetail = () => document.getElementById('adminOrderDetailModal').classList.add('hidden');

    // --- إدارة السائقين ---
    window.loadDrivers = async () => {
        try {
            const q = query(collection(db, "users"), where("role", "==", "driver"));
            const snap = await getDocs(q);
            let html = '';
            snap.forEach(docSnap => {
                const d = docSnap.data();
                html += `<div class="card">
                    <b>${d.name}</b> (${d.username})<br>
                    الهاتف: ${d.phone || 'غير محدد'}
                    <button class="btn btn-danger" style="margin-top:8px;" onclick="deleteDriver('${docSnap.id}')">حذف السائق</button>
                </div>`;
            });
            document.getElementById('driversList').innerHTML = html || '<p>لا يوجد سائقين.</p>';
        } catch (e) {
            alert('خطأ في تحميل السائقين: ' + e.message);
        }
    };

    window.addDriver = async () => {
        const username = document.getElementById('newDriverUsername').value.trim();
        const password = document.getElementById('newDriverPassword').value.trim();
        const name = document.getElementById('newDriverName').value.trim();
        const phone = document.getElementById('newDriverPhone').value.trim();
        if (!username || !password || !name) {
            document.getElementById('addDriverError').innerText = 'اسم المستخدم وكلمة المرور والاسم مطلوبة';
            return;
        }
        try {
            const existQ = query(collection(db, "users"), where("username", "==", username));
            const existSnap = await getDocs(existQ);
            if (!existSnap.empty) {
                document.getElementById('addDriverError').innerText = 'اسم المستخدم موجود مسبقاً';
                return;
            }
            await addDoc(collection(db, "users"), {
                username,
                password,
                name,
                phone,
                role: "driver"
            });
            document.getElementById('newDriverUsername').value = '';
            document.getElementById('newDriverPassword').value = '';
            document.getElementById('newDriverName').value = '';
            document.getElementById('newDriverPhone').value = '';
            document.getElementById('addDriverError').innerText = '';
            loadDrivers();
            alert('تم إضافة السائق بنجاح');
        } catch (e) {
            document.getElementById('addDriverError').innerText = 'خطأ: ' + e.message;
        }
    };

    window.deleteDriver = async (driverId) => {
        if (confirm('هل أنت متأكد من حذف هذا السائق؟')) {
            try {
                await deleteDoc(doc(db, "users", driverId));
                loadDrivers();
            } catch (e) {
                alert('فشل حذف السائق: ' + e.message);
            }
        }
    };

    // --- التقارير ---
    function listenAdminReports() {
        const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
        onSnapshot(q, snap => {}, error => console.error(error));
    }

    window.loadAdminReports = async () => {
        try {
            const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            let total = 0, pending = 0, accepted = 0, picked = 0, onWay = 0, delivered = 0, cancelled = 0;
            const driverStats = {};
            const customerStats = {};
            snap.forEach(docSnap => {
                const o = docSnap.data();
                total++;
                if (o.status === 'pending') pending++;
                else if (o.status === 'accepted') accepted++;
                else if (o.status === 'picked_up') picked++;
                else if (o.status === 'on_the_way') onWay++;
                else if (o.status === 'delivered') delivered++;
                else if (o.status === 'cancelled') cancelled++;

                if (o.driverName) driverStats[o.driverName] = (driverStats[o.driverName] || 0) + 1;
                if (o.customerName) customerStats[o.customerName] = (customerStats[o.customerName] || 0) + 1;
            });

            let html = `<div class="card"><h3>إحصائيات عامة</h3>
                <p>إجمالي الطلبات: ${total}</p>
                <p>معلقة: ${pending}</p>
                <p>تم القبول: ${accepted}</p>
                <p>تم الاستلام: ${picked}</p>
                <p>في الطريق: ${onWay}</p>
                <p>تم التسليم: ${delivered}</p>
                <p>ملغاة: ${cancelled}</p>
            </div>`;

            html += '<div class="card"><h3>أداء السائقين</h3>';
            for (const [name, count] of Object.entries(driverStats)) {
                html += `<p>${name}: ${count} طلب</p>`;
            }
            html += '</div>';

            html += '<div class="card"><h3>الزبائن</h3>';
            for (const [name, count] of Object.entries(customerStats)) {
                html += `<p>${name}: ${count} طلب</p>`;
            }
            html += '</div>';

            document.getElementById('adminReportsContent').innerHTML = html;
        } catch (e) {
            alert('خطأ في التقارير: ' + e.message);
        }
    };

    // ---------- الدردشة ----------
    window.openChat = (orderId) => {
        currentOrderId = orderId;
        document.getElementById('chatModal').classList.remove('hidden');
        listenChat(orderId, true);
    };
    window.closeChat = () => { document.getElementById('chatModal').classList.add('hidden'); currentOrderId = null; };

    function listenChat(orderId, isLoggedIn) {
        const q = query(collection(db, "orders", orderId, "messages"), orderBy("timestamp"));
        onSnapshot(q, snap => {
            let html = '';
            snap.forEach(doc => {
                const m = doc.data();
                let isMine = false;
                if (isLoggedIn && currentUser) {
                    isMine = m.senderId === currentUser.username;
                } else if (window.tempCustomer) {
                    isMine = m.senderId === window.tempCustomer.phone || m.senderId === 'customer';
                }
                html += `<div class="chat-msg ${isMine ? 'msg-mine' : ''}">
                    <span class="msg-sender">${m.senderName}:</span> ${m.text}
                </div>`;
            });
            document.getElementById('chatMessages').innerHTML = html;
            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
        }, error => {
            console.error("خطأ في الدردشة:", error);
        });
    }

    window.sendMessage = async () => {
        const text = document.getElementById('chatInput').value.trim();
        if (!text || !currentOrderId) return;
        let senderId, senderName;
        if (currentUser) {
            senderId = currentUser.username;
            senderName = currentUser.name;
        } else if (window.tempCustomer) {
            senderId = window.tempCustomer.phone || 'customer';
            senderName = window.tempCustomer.name || 'زبون';
        } else {
            alert('لا يمكن تحديد المرسل');
            return;
        }
        try {
            await addDoc(collection(db, "orders", currentOrderId, "messages"), {
                senderId,
                senderName,
                text,
                timestamp: serverTimestamp()
            });
            document.getElementById('chatInput').value = '';
        } catch (e) {
            alert('فشل إرسال الرسالة: ' + e.message);
        }
    };

    function translateStatus(status) {
        const map = {
            pending: 'معلقة',
            accepted: 'تم القبول',
            picked_up: 'تم الاستلام',
            on_the_way: 'في الطريق',
            delivered: 'تم التسليم',
            cancelled: 'ملغاة',
            negotiating: 'تفاوض'
        };
        return map[status] || status;
    }

    // بدء التطبيق
    goToMain();

    // Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
</script>
</body>
</html>
